<div class="slide-wrapper">
  <div class="container relative">
    <!-- social -->

    <div class="header-social-warpper">
      <div class="social social--header">
        <a class="social__item">
          <img src="img/socials/social-tumblr.svg" alt="" />
        </a>

        <a class="social__item">
          <img src="img/socials/social-twitter.svg" alt="" />
        </a>

        <a class="social__item">
          <img src="img/socials/social-vimeo.svg" alt="" />
        </a>
      </div>
    </div>
  </div>

  <div id="headerSlider" class="owl-carousel">
    @@include('header-slider-items/_slide-item.html')
    @@include('header-slider-items/_slide-item.html')
    @@include('header-slider-items/_slide-item.html')
    @@include('header-slider-items/_slide-item.html')
    @@include('header-slider-items/_slide-item.html')
  </div>

  <div class="container relative">
    <!-- slide controls -->
    <div class="slide-controls">
      <a id="headerSliderLeft" class="slide-controls__left" href="#">
        <img src="img/controls/header-slider-left.svg" alt="" />
      </a>

      <div class="slide-controls__number">
        <span class="slide-controls__number-active">-</span>
        <span class="slide-controls__number-from"> / </span>
        <span class="slide-controls__number-total">-</span>
      </div>

      <a id="headerSliderRight" class="slide-controls__right" href="#">
        <img src="img/controls/header-slider-right.svg" alt="" />
      </a>
    </div>
  </div>
</div>
